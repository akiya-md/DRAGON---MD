<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AKIYA 龍 - GET BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }
            50% { text-shadow: 0 0 20px rgba(220, 38, 38, 1); }
        }
        .pairing-code { font-family: 'Courier New', monospace; animation: glow 2s infinite; }
        .loading-spinner { border: 3px solid rgba(255, 0, 0, 0.3); border-top: 3px solid #ff0000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-black text-white p-10 text-center min-h-screen flex flex-col items-center justify-center">
    
    <h1 class="text-red-600 text-3xl font-black italic mb-10 tracking-widest uppercase">/ GET YOUR PAIRING CODE /</h1>
    
    <div class="bg-zinc-900 p-10 rounded-[40px] border border-red-600 inline-block shadow-[0_0_50px_rgba(255,0,0,0.1)]">
        <p class="text-[10px] text-gray-500 mb-6 uppercase tracking-widest">Enter number with country code (Ex: 94771234567)</p>
        
        <input type="text" id="phoneNumber" placeholder="947xxxxxxxx" 
            class="bg-transparent border-b-2 border-red-600 text-center text-xl outline-none mb-8 w-full max-w-xs focus:border-white transition-all font-mono">
        
        <br>
        
        <div id="statusContainer" class="mb-8 hidden">
            <p id="statusText" class="text-xs text-gray-400 mb-2 uppercase"></p>
            <div id="codeDisplay" class="text-4xl font-black text-red-600 pairing-code tracking-[10px]"></div>
        </div>

        <button onclick="getPairingCode()" id="submitBtn" 
            class="bg-red-600 px-10 py-3 rounded-full font-bold uppercase text-xs hover:bg-red-700 active:scale-95 transition-all shadow-lg">
            Get Code
        </button>
    </div>

    <br>
    <button onclick="window.location.href='index.html'" class="mt-10 text-[10px] text-gray-600 hover:text-red-600 transition-colors uppercase tracking-widest">
        <i class="fas fa-arrow-left mr-2"></i> BACK TO HOME
    </button>

    <script>
        async function getPairingCode() {
            const number = document.getElementById('phoneNumber').value;
            const btn = document.getElementById('submitBtn');
            const statusContainer = document.getElementById('statusContainer');
            const statusText = document.getElementById('statusText');
            const codeDisplay = document.getElementById('codeDisplay');

            // 1. Validation
            if (!number || number.length < 10) {
                alert("අඩෝ නම්බර් එක හරියට ගහපන් බන්! (Ex: 94771234567)");
                return;
            }

            // 2. UI Update (Loading)
            btn.disabled = true;
            btn.innerText = "Connecting...";
            btn.classList.add('opacity-50');
            statusContainer.classList.remove('hidden');
            statusText.innerHTML = '<span class="loading-spinner mr-2"></span> WAITING FOR WHATSAPP...';
            codeDisplay.innerText = "";

            try {
                // 3. API Call to Render
                // මම ඔයාගේ Render Link එක මෙතනට දැම්මා
                const response = await fetch(`https://akiya-api-rhlv.onrender.com/pair?number=${number}`);
                const data = await response.json();

                if (data.code) {
                    // 4. Success Display
                    statusText.innerText = "YOUR PAIRING CODE IS READY:";
                    codeDisplay.innerText = data.code;
                    btn.innerText = "GET NEW CODE";
                } else {
                    // 5. Error Handling
                    statusText.innerText = "ERROR OCCURRED!";
                    codeDisplay.innerText = "FAILED";
                    alert(data.error || "Error එකක් ආවා බන්. ආයේ ට්‍රයි කරපන්.");
                }
            } catch (err) {
                statusText.innerText = "SERVER DOWN!";
                codeDisplay.innerText = "ERROR";
                alert("සර්වර් එක නිදි වගේ බන්. විනාඩියක් ඉඳලා ආයේ බලපන්.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                if(btn.innerText !== "GET NEW CODE") btn.innerText = "Get Code";
            }
        }
    </script>
</body>
</html>
