<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKIYA 龍 MD | CONTROL PANEL</title>
    <style>
        /* ඩාර්ක් තේමාව සහ පසුබිම */
        body { 
            background-color: #050505; 
            color: #ff3333; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 20px;
            text-align: center;
        }

        /* ප්‍රධාන මාතෘකාව */
        h1 { font-size: 3.5rem; text-shadow: 0 0 20px #ff0000; margin-bottom: 5px; }

        /* කාඩ් කන්ටේනර් එක */
        .card-container { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 40px; 
        }

        /* කාඩ් එකේ ඩිසයින් එක (දිලිසෙන බෝඩර් එකක් එක්ක) */
        .card { 
            background: #111; 
            border: 2px solid #ff0000; 
            border-radius: 15px; 
            width: 320px; padding: 25px; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            transition: 0.4s;
        }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 30px #ff0000; }

        /* බටන් එකේ පෙනුම */
        .btn { 
            background: #ff0000; color: #fff; padding: 12px; 
            border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; width: 100%; margin-top: 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { background: #cc0000; box-shadow: 0 0 10px #ff0000; }

        /* ඉන්පුට් බොක්ස් එක */
        .input-field { 
            width: 90%; padding: 12px; margin-top: 15px; 
            background: #1a1a1a; border: 1px solid #ff0000; 
            color: #fff; border-radius: 5px; outline: none;
            text-align: center;
        }

        .status-text { color: #00ff00; font-weight: bold; text-shadow: 0 0 5px #00ff00; }
    </style>
</head>
<body>

    <h1>AKIYA 龍 MD</h1>
    <p style="letter-spacing: 3px; color: #888;">ADVANCED WHATSAPP AUTOMATION SYSTEM</p>

    <div class="card-container">
        <div class="card">
            <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">🔗 BOT CONNECTION</h2>
            <p style="font-size: 0.85rem; color: #aaa;">මෙතැනින් ඔබේ WhatsApp ගිණුම සම්බන්ධ කරන්න.</p>
            <button class="btn">PAIR CODE ලබාගන්න</button>
            <p style="margin-top: 15px; font-size: 0.9rem;">STATUS: <span class="status-text">READY</span></p>
        </div>

        <div class="card">
            <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">⚙️ USER SETTINGS</h2>
            <input type="text" class="input-field" placeholder="Secret Key එක මෙහි ගසන්න">
            <div style="text-align: left; padding: 15px 0; font-size: 0.9rem;">
                <p>• Auto Status View: <span class="status-text">ON</span></p>
                <p>• Anti-Delete: <span class="status-text">ACTIVE</span></p>
                <p>• Stealth Mode: <span class="status-text">READY</span></p>
            </div>
            <button class="btn" style="background: #444;">SAVE CONFIGURATION</button>
        </div>

        <div class="card">
            <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">🪙 COIN WALLET</h2>
            <p style="font-size: 3rem; margin: 15px 0; color: #fff;">500 <span style="font-size: 1rem; color: #ff0000;">COINS</span></p>
            <p style="color: #666; font-size: 0.8rem;">ACCOUNT: 94755751816</p>
            <button class="btn" style="background: transparent; border: 1px solid #ff0000; color: #ff0000;">TOP UP NOW</button>
        </div>
    </div>

</body>
</html>
