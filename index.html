<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKIYA 龍 MD | SECURE LOGIN</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-box {
            background: rgba(15, 15, 15, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px #ff0000;
            text-align: center;
            width: 350px;
        }
        .logo {
            width: 150px;
            border-radius: 50%;
            border: 3px solid #ff0000;
            box-shadow: 0 0 15px #ff0000;
            margin-bottom: 20px;
        }
        h2 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            outline: none;
        }
        input:focus { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #ff0000;
            border: none;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background: #b30000; box-shadow: 0 0 20px #ff0000; }
        .footer-text { font-size: 12px; margin-top: 20px; color: #888; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://i.ibb.co/68vD66F/logo.jpg" alt="Logo" class="logo">
    <h2>Access Portal</h2>
    <input type="text" placeholder="WhatsApp Number (07XXXXXXXX)">
    <input type="password" placeholder="Secret Password">
    <button onclick="login()">ENTER THE REALM</button>
    <div class="footer-text">OWNER: AKIYA 龍 | SYSTEM SECURE</div>
</div>

<script>
    function login() {
        alert("Connecting to Dragon Server... Please wait.");
        // මෙතනට තමයි අපේ Backend API එක ලින්ක් කරන්නේ
    }
    // Anti-Inspect Code
    document.onkeydown = function(e) {
        if(event.keyCode == 123) { return false; }
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
    };
</script>

</body>
</html>
