<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKIYA 龍 - SYSTEM PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 0, 0, 0.2); transition: 0.3s; }
        .glass-card:hover { border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); transform: translateY(-5px); }
        .red-glow { text-shadow: 0 0 15px rgba(255, 0, 0, 0.7); }
        .admin-secret { opacity: 0.05; cursor: pointer; transition: 0.5s; }
        .admin-secret:hover { opacity: 1; color: #ff0000; }
    </style>
</head>
<body class="bg-black min-h-screen pb-10 px-4">

    <div class="max-w-4xl mx-auto mt-6 mb-10">
        <div class="rounded-3xl overflow-hidden border-2 border-red-600 shadow-[0_0_30px_rgba(255,0,0,0.4)]">
            <img src="https://raw.githubusercontent.com/akiya-md/DRAGON---MD/main/logo2.png" alt="AKIYA Banner" class="w-full">
        </div>
    </div>

    <div class="text-center mb-12">
        <h1 class="text-5xl font-black red-glow italic uppercase tracking-tighter italic">AKIYA 龍 PORTAL</h1>
        <p class="text-red-500 text-xs tracking-[0.4em] mt-3">NEXT-GEN WHATSAPP AUTOMATION</p>
    </div>

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">
        <div class="glass-card p-8 rounded-[30px] text-center">
            <i class="fas fa-robot text-4xl text-red-600 mb-4"></i>
            <h3 class="text-xl font-bold mb-2 uppercase">Get Bot</h3>
            <p class="text-gray-400 text-sm mb-6">Connect your WhatsApp via Pairing Code.</p>
            <button class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full w-full transition">START NOW</button>
        </div>

        <div class="glass-card p-8 rounded-[30px] text-center">
            <i class="fas fa-sliders-h text-4xl text-red-600 mb-4"></i>
            <h3 class="text-xl font-bold mb-2 uppercase">Settings</h3>
            <p class="text-gray-400 text-sm mb-6">Manage Auto-React & Call Block.</p>
            <button class="border border-red-600 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-full w-full transition">OPEN PANEL</button>
        </div>

        <div class="glass-card p-8 rounded-[30px] text-center">
            <h3 class="text-xs uppercase tracking-widest text-gray-400 mb-4">Live Visitors</h3>
            <div class="flex justify-center py-2">
                <a href="https://www.freecounterstat.com" title="website counter"><img src="https://counter9.stat.ovh/private/freecounterstat.php?c=89e9mql7u5nylcl7u8rlybcl7mxlcl7u" border="0" title="website counter" alt="website counter"></a>
            </div>
            <div class="mt-4 flex items-center justify-center gap-2 text-green-500 font-bold text-xs uppercase">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-ping"></span> System Online
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto border-t border-gray-900 pt-10 text-center">
        <div onclick="adminLogin()" class="admin-secret text-[10px] font-bold inline-block">
            <i class="fas fa-user-shield mr-1"></i> MASTER LOGIN
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAs-TemporaryKey",
            authDomain: "akiya-bot-auth.firebaseapp.com",
            projectId: "akiya-bot-auth",
        };
        firebase.initializeApp(firebaseConfig);

        function adminLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                const user = result.user;
                if (user.email === "kaviakiya@gmail.com") {
                    sessionStorage.setItem("admin_auth", "true");
                    window.location.href = "admin.html";
                } else {
                    alert("ACCESS DENIED: You are not Akiya!");
                    firebase.auth().signOut();
                }
            }).catch((err) => { alert("Login Error: " + err.message); });
        }
    </script>
</body>
</html>
