
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>👑 AKIYA - MASTER ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: radial-gradient(circle, #1a0000 0%, #000000 100%); color: white; font-family: 'Inter', sans-serif; }
        .admin-card { background: rgba(0, 0, 0, 0.7); border: 2px solid #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.2); backdrop-filter: blur(10px); }
        .log-box { background: rgba(0, 0, 0, 0.5); border: 1px solid #330000; font-family: 'Courier New', monospace; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-black text-red-600 mb-10 italic uppercase tracking-widest">/ MASTER BRAIN /</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="md:col-span-2 admin-card p-8 rounded-[40px]">
                <h3 class="text-xl font-bold mb-6 italic uppercase underline decoration-red-600">Global Live Growth</h3>
                <canvas id="liveChart" height="150"></canvas>
            </div>
            <div class="space-y-4">
                <div class="admin-card p-6 rounded-3xl text-center">
                    <p class="text-gray-500 text-xs uppercase">Total Bots</p>
                    <p id="totalBots" class="text-4xl font-black text-red-600 tracking-tighter text-shadow-glow">0</p>
                </div>
                <div class="admin-card p-6 rounded-3xl text-center">
                    <p class="text-gray-500 text-xs uppercase">Server Load</p>
                    <p id="serverLoad" class="text-4xl font-black text-green-500">0%</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div class="admin-card p-8 rounded-[40px]">
                <h3 class="text-xl font-bold mb-4 italic uppercase text-red-600"><i class="fas fa-microscope mr-2"></i> Live Activity Feed</h3>
                <div id="logFeed" class="h-48 overflow-y-auto log-box p-4 rounded-xl text-[10px] space-y-2">
                    <p class="text-gray-600">Waiting for live data...</p>
                </div>
            </div>
            <div class="admin-card p-8 rounded-[40px]">
                <h3 class="text-xl font-bold mb-4 italic uppercase"><i class="fas fa-rocket mr-2"></i> Channel Booster</h3>
                <input type="text" id="channelLink" placeholder="Paste Channel Link" class="w-full bg-zinc-900 border border-red-900 p-4 rounded-xl mb-4 text-sm outline-none focus:border-red-600">
                <input type="number" id="boostAmount" placeholder="Boost Amount (e.g. 500)" class="w-full bg-zinc-900 border border-red-900 p-4 rounded-xl mb-4 text-sm outline-none">
                <button onclick="startBoost()" class="w-full bg-red-600 py-3 rounded-xl font-black uppercase text-xs hover:bg-red-700 transition">Execute Boost</button>
            </div>
        </div>

        <div class="admin-card p-8 rounded-[40px]">
            <h3 class="text-xl font-bold mb-6 italic uppercase"><i class="fas fa-users-cog mr-2"></i> Connected Users</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="text-red-600 uppercase border-b border-zinc-800">
                            <th class="pb-4">Number</th>
                            <th class="pb-4">Status</th>
                            <th class="pb-4">Last Activity</th>
                            <th class="pb-4">Control</th>
                        </tr>
                    </thead>
                    <tbody id="userTable" class="text-gray-400">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBa0kzXnEx2teO03tmwgMJY1zyOs3OkB5I",
            authDomain: "dragon-akiya-md.firebaseapp.com",
            projectId: "dragon-akiya-md",
            storageBucket: "dragon-akiya-md.firebasestorage.app",
            messagingSenderId: "962763496759",
            appId: "1:962763496759:web:4f0c7ebcdc5865c4384eb2",
            databaseURL: "https://dragon-akiya-md-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- REAL-TIME STATS ---
        db.ref('system_stats').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('totalBots').innerText = data.total || "1,284";
                document.getElementById('serverLoad').innerText = (data.load || "12") + "%";
            }
        });

        // --- LIVE LOGS ---
        db.ref('logs').limitToLast(15).on('child_added', (snap) => {
            const log = snap.val();
            const feed = document.getElementById('logFeed');
            const p = document.createElement('p');
            p.innerHTML = `<span class="text-red-600">[${new Date().toLocaleTimeString()}]</span> User ${log.user} used ${log.cmd}`;
            feed.appendChild(p);
            feed.scrollTop = feed.scrollHeight;
        });

        // --- CHANNEL BOOSTER ---
        function startBoost() {
            const link = document.getElementById('channelLink').value;
            const amount = document.getElementById('boostAmount').value;
            if(!link || !amount) return alert("Details dapan bn!");
            
            db.ref('tasks/boost').push({ link, amount, status: 'pending' });
            alert("BOOST STARTED FOR: " + amount + " FOLLOWERS!");
        }

        // --- CHART SETUP ---
        const ctx = document.getElementById('liveChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['12PM', '1PM', '2PM', '3PM', '4PM', '5PM'],
                datasets: [{
                    label: 'Live Bots',
                    data: [100, 300, 200, 800, 1100, 1284],
                    borderColor: '#ff0000',
                    backgroundColor: 'rgba(255, 0, 0, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            }
        });
    </script>
</body>
</html>
