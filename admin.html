<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 𝐌𝐃 - Secure Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: #111; padding: 40px; border-radius: 20px; border: 1px solid #ff0000; text-align: center;
        }
        input[type="password"] {
            padding: 12px; width: 250px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; text-align: center; font-size: 18px;
        }
        .btn-login {
            padding: 12px 30px; background: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        /* Admin Content (Hidden by default) */
        #admin-content { display: none; }

        
        .header { text-align: center; border-bottom: 2px solid #ff0000; padding-bottom: 20px; margin-bottom: 30px; }
        .banner { width: 100%; max-width: 600px; border-radius: 15px; box-shadow: 0 0 20px #ff0000; }
        .card { background: #111; border: 1px solid #ff0000; padding: 20px; border-radius: 15px; width: 200px; text-align: center; margin: 10px; display: inline-block; }
        .booster-section { background: #111; padding: 20px; border-radius: 15px; border-left: 5px solid #ff0000; margin-bottom: 30px; text-align: left; }
        input[type="text"], input[type="number"] { padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; margin: 5px; }
        .btn-boost { background: #ff0000; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: #ff0000;">🔐 ADMIN ACCESS</h2>
            <p style="color: #888;">Enter Master Password</p>
            <input type="password" id="admin-pass" placeholder="••••••••">
            <br>
            <button class="btn-login" onclick="checkAuth()">LOGIN NOW</button>
            <p id="error-msg" style="color: yellow; font-size: 12px; margin-top: 10px; display: none;">Wrong Password! Try again.</p>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <img src="logo2.jpg" alt="AKIYA Logo" class="banner">
            <h1>𝐀𝐊𝐈𝐘𝐀 龍 𝐌𝐃 - 𝚂𝚄𝙿𝙴𝚁 𝙰𝙳𝙼𝙸𝙽</h1>
        </div>

        <div style="text-align: center;">
            <div class="card"><h3>ACTIVE BOTS</h3><p id="active-bots">0</p></div>
            <div class="card"><h3>REMOVED BOTS</h3><p id="removed-bots">0</p></div>
        </div>

        <div class="booster-section">
            <h2>🚀 CHANNEL BOOSTER</h2>
            <p>Target Channel Link:</p>
            <input type="text" id="target-link" style="width: 70%;" placeholder="https://whatsapp.com/channel/xxx">
            <button class="btn-boost">UPDATE AUTO-BOOST</button>
        </div>

        <div class="booster-section">
            <h2>⚙️ MASTER CONTROLS</h2>
            <button class="btn-boost" style="background: #444;">RESTART SYSTEM</button>
            <button class="btn-boost" style="background: #444;">SHUTDOWN ALL BOTS</button>
        </div>
    </div>

    <script>
        function checkAuth() {
            const inputPass = document.getElementById('admin-pass').value;
            const masterPass = "Akindu@Dewshan20241118"; 

            if (inputPass === masterPass) {
               
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                
                
                sessionStorage.setItem("admin_auth", "true");
                console.log("Login Success!");
            } else {
                
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('admin-pass').value = "";
                alert("Wrong Password! Please try again.");
            }
        }

        
        window.addEventListener('load', function() {
            if (sessionStorage.getItem("admin_auth") === "true") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            }
        });
    </script>

</body>
</html>
