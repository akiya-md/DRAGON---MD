<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>👑 AKIYA - MASTER ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: radial-gradient(circle, #1a0000 0%, #000000 100%); color: white; font-family: 'Inter', sans-serif; }
        .admin-card { background: rgba(0, 0, 0, 0.7); border: 2px solid #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.2); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-black text-red-600 mb-10 italic uppercase tracking-widest">/ MASTER BRAIN /</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="md:col-span-2 admin-card p-8 rounded-[40px]">
                <h3 class="text-xl font-bold mb-6 italic uppercase underline decoration-red-600">Global Live Growth</h3>
                <canvas id="liveChart" height="150"></canvas>
            </div>
            <div class="space-y-4">
                <div class="admin-card p-6 rounded-3xl text-center">
                    <p class="text-gray-500 text-xs uppercase">Total Bots</p>
                    <p class="text-4xl font-black text-red-600">1,284</p>
                </div>
                <div class="admin-card p-6 rounded-3xl text-center">
                    <p class="text-gray-500 text-xs uppercase">Server Load</p>
                    <p class="text-4xl font-black text-green-500 text-shadow-glow">12%</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="admin-card p-8 rounded-[40px]">
                <h3 class="text-xl font-bold mb-4 italic uppercase"><i class="fas fa-rocket mr-2"></i> Channel Booster</h3>
                <input type="text" placeholder="Channel Link" class="w-full bg-zinc-900 border border-red-900 p-4 rounded-xl mb-4 text-sm">
                <button class="w-full bg-red-600 py-3 rounded-xl font-black uppercase text-xs">Boost Followers</button>
            </div>

            <div class="admin-card p-8 rounded-[40px]">
                <h3 class="text-xl font-bold mb-4 italic uppercase"><i class="fas fa-broadcast-tower mr-2"></i> Central Control</h3>
                <div class="flex gap-4">
                    <button class="flex-1 bg-zinc-800 p-4 rounded-xl text-red-500 font-bold border border-red-900 text-[10px]">RESTART ALL</button>
                    <button class="flex-1 bg-red-600 p-4 rounded-xl text-white font-bold text-[10px]">GLOBAL SHUTDOWN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('liveChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['12PM', '1PM', '2PM', '3PM', '4PM', '5PM'],
                datasets: [{
                    label: 'Live Bots',
                    data: [100, 300, 200, 800, 1100, 1284],
                    borderColor: '#ff0000',
                    backgroundColor: 'rgba(255, 0, 0, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            }
        });
    </script>
</body>
</html>
