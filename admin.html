<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 𝐌𝐃 - Master Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --dark: #0a0a0a; --card: #111; }
        body { background-color: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-box {
            background: var(--card); padding: 40px; border-radius: 25px; border: 1px solid var(--red); text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }
        input[type="password"] {
            padding: 12px; width: 250px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; text-align: center; font-size: 18px; margin-bottom: 20px;
        }
        .btn-login { padding: 12px 40px; background: var(--red); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Main Layout */
        #admin-content { display: none; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .banner { width: 100%; max-width: 800px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 20px var(--red); }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; border-bottom: 4px solid var(--red); text-align: center; }
        .stat-card i { font-size: 2rem; color: var(--red); margin-bottom: 10px; }
        .stat-card h3 { font-size: 14px; color: #888; margin: 5px 0; }
        .stat-card p { font-size: 28px; font-weight: bold; margin: 0; }

        /* Booster & Controls Section */
        .grid-6-4 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 40px; }
        .panel-box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .panel-box h2 { border-left: 5px solid var(--red); padding-left: 15px; font-size: 18px; margin-bottom: 20px; }
        
        input[type="text"], input[type="number"] {
            width: 90%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 15px;
        }
        .btn-action { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-action:hover { background: #cc0000; box-shadow: 0 0 15px var(--red); }

        /* Chart Area */
        .chart-container { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo2.jpg" style="width: 80px; border-radius: 50%; margin-bottom: 15px; border: 2px solid var(--red);">
            <h2 style="color: var(--red);">𝐀𝐊𝐈𝐘𝐀 龍 𝐌𝐃</h2>
            <p style="color: #666; font-size: 12px;">MASTER ACCESS ONLY</p>
            <input type="password" id="admin-pass" placeholder="Master Password">
            <br>
            <button class="btn-login" onclick="checkAuth()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <img src="logo2.jpg" alt="AKIYA Logo" class="banner">
            <h1>MASTER <span style="color: var(--red);">DASHBOARD</span></h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-robot"></i><h3>ACTIVE BOTS</h3><p id="active-bots">124</p></div>
            <div class="stat-card"><i class="fas fa-user-slash"></i><h3>REMOVED</h3><p id="removed-bots">8</p></div>
            <div class="stat-card"><i class="fas fa-users"></i><h3>LIVE VISITORS</h3><p id="live-visitors">42</p></div>
            <div class="stat-card"><i class="fas fa-coins"></i><h3>COINS CIRCULATED</h3><p>85.4K</p></div>
        </div>

        <div class="grid-6-4">
            <div class="panel-box">
                <h2>🚀 CHANNEL BOOSTER (AUTO & MANUAL)</h2>
                <label style="font-size: 12px; color: #888;">Official Auto-Follow Link:</p>
                <input type="text" id="auto-link" placeholder="https://whatsapp.com/channel/Official_Link">
                
                <label style="font-size: 12px; color: #888;">Manual Boost Link:</p>
                <input type="text" id="manual-link" placeholder="Target Channel Link">
                <input type="number" id="boost-count" placeholder="Followers Count (e.g. 50)">
                <button class="btn-action">EXECUTE BOOST COMMAND</button>
            </div>

            <div class="panel-box">
                <h2>⚙️ SYSTEM CONTROLS</h2>
                <button class="btn-action" style="background: #222; margin-bottom: 10px;"><i class="fas fa-sync"></i> RESTART CORE</button>
                <button class="btn-action" style="background: #222; margin-bottom: 10px;"><i class="fas fa-database"></i> CLEAR TEMP LOGS</button>
                <button class="btn-action" style="background: #800;"><i class="fas fa-power-off"></i> SHUTDOWN ALL BOTS</button>
            </div>
        </div>

        <div class="chart-container">
            <h2>📈 BOT ACTIVITY (LAST 7 DAYS)</h2>
            <canvas id="botChart"></canvas>
        </div>

        <footer style="text-align: center; padding: 40px; color: #444; font-size: 12px;">
            𝖯𝗈𝗐𝖾𝗋𝖽 𝖡𝗒 𝐀𝐊𝐈𝐘𝐀 龍 ⚙️ - 𝙼𝙳 | v2.0 Premium
        </footer>
    </div>

    <script>
        // AUTH LOGIC
        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "Akindu@Dewshan20241118") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                sessionStorage.setItem("akiya_auth", "true");
                loadGraph();
            } else {
                alert("ACCESS DENIED!");
            }
        }

        window.onload = function() {
            if(sessionStorage.getItem("akiya_auth") === "true") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadGraph();
            }
        }

        // GRAPH LOGIC
        function loadGraph() {
            const ctx = document.getElementById('botChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Active Deployments',
                        data: [45, 52, 48, 70, 85, 110, 124],
                        borderColor: '#ff0000',
                        backgroundColor: 'rgba(255, 0, 0, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#222' } },
                        x: { grid: { color: '#222' } }
                    }
                }
            });
        }

        // Live Visitor Randomizer (Just for demo UI)
        setInterval(() => {
            const count = Math.floor(Math.random() * (50 - 30 + 1)) + 30;
            document.getElementById('live-visitors').innerText = count;
        }, 5000);
    </script>
</body>
</html>
