<!DOCTYPE html>
<html>
<head>
    <title>AKIYA 龍 MD | MASTER PANEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background: #050505; color: red; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .glow { text-shadow: 0 0 20px red; font-size: 30px; margin-top: 50px; position: absolute; width: 100%; z-index: 10; }
        #globe { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div class="glow">AKIYA 龍 MD MASTER SYSTEM ACTIVE ✅</div>
    <div id="globe"></div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('globe').appendChild(renderer.domElement);
        const globe = new THREE.Mesh(new THREE.SphereGeometry(5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true }));
        scene.add(globe); camera.position.z = 10;
        function anim() { requestAnimationFrame(anim); globe.rotation.y += 0.005; globe.rotation.x += 0.002; renderer.render(scene, camera); }
        anim();
    </script>
</body>
</html>
