<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AKIYA 龍 - BOT SETTINGS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 0, 0, 0.05); border: 1px solid rgba(255, 0, 0, 0.2); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6 flex flex-col items-center">
    <h1 class="text-2xl font-black text-red-600 mb-8 uppercase italic">⚙️ Bot Settings</h1>
    
    <div class="w-full max-w-md space-y-4">
        <div class="glass p-4 rounded-2xl">
            <label class="text-[10px] uppercase text-gray-500">WhatsApp Number</label>
            <input type="text" placeholder="9471xxxxxxx" class="w-full bg-transparent border-b border-red-600 py-2 outline-none text-sm">
        </div>

        <div class="glass p-4 rounded-2xl">
            <label class="text-[10px] uppercase text-gray-500">Panel Password</label>
            <input type="password" placeholder="••••••••" class="w-full bg-transparent border-b border-red-600 py-2 outline-none text-sm">
        </div>

        <div class="glass p-6 rounded-[30px] space-y-6">
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold uppercase">Auto React</span>
                <input type="checkbox" class="accent-red-600 h-5 w-5">
            </div>
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold uppercase">Call Block</span>
                <input type="checkbox" class="accent-red-600 h-5 w-5">
            </div>
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold uppercase">Anti-Link</span>
                <input type="checkbox" class="accent-red-600 h-5 w-5">
            </div>
        </div>

        <button class="w-full bg-red-600 py-4 rounded-full font-black text-xs uppercase mt-6 shadow-[0_0_20px_rgba(255,0,0,0.3)]">Update Settings</button>
        <button onclick="window.location.href='index.html'" class="w-full text-gray-500 text-[10px] uppercase mt-4">Go Back</button>
    </div>
</body>
</html>
