<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKIYA 龍 MD | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #ff0000; --bg: #050505; --card-bg: rgba(20, 20, 20, 0.9); --glow: 0 0 15px #ff0000; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); background: black; }
        .dragon-logo { font-size: 2.2rem; font-weight: bold; color: var(--primary); text-shadow: var(--glow); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 15px; padding: 20px; transition: 0.3s; }
        .card:hover { border-color: var(--primary); box-shadow: var(--glow); }
        h3 { color: var(--primary); border-bottom: 1px solid #444; padding-bottom: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .pairing-code { font-size: 28px; text-align: center; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; margin-top: 15px; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

<header>
    <div class="dragon-logo">AKIYA 龍 MD</div>
    <p id="nav-info">Public Pairing Interface</p>
</header>

<div id="user-panel" class="container">
    <div class="card">
        <h3>🔗 GET PAIRING CODE</h3>
        <p>නම්බර් එක ගහලා කෝඩ් එක ගන්න:</p>
        <input type="text" id="phone" placeholder="947xxxxxxxx">
        <button onclick="getPair()">GENERATE CODE</button>
        <div id="pair-display" class="pairing-code"></div>
    </div>
</div>

<div id="admin-panel" class="container">
    <div class="card">
        <h3>🌍 LIVE WORLD MAP</h3>
        <div id="globe-container" style="height: 250px;"></div>
    </div>
    <div class="card">
        <h3>📈 BOT STATISTICS</h3>
        <canvas id="botChart"></canvas>
    </div>
    <div class="card">
        <h3>🚀 ADMIN BOOSTER</h3>
        <input type="text" placeholder="Channel Link">
        <button onclick="alert('Boost Activated!')">START BOOST</button>
    </div>
</div>

<script>
    // Secret Login Check
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('login') === 'akiya_master') {
        document.getElementById('user-panel').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'grid';
        document.getElementById('nav-info').innerText = "ADMIN CONTROL MODE";
        initGlobe();
        initChart();
    }

    function getPair() {
        const n = document.getElementById('phone').value;
        if(!n) return alert("Number එක ගහපන්!");
        document.getElementById('pair-display').innerText = "CONNECTING...";
        setTimeout(() => {
            document.getElementById('pair-display').innerText = Math.random().toString(36).substring(2, 9).toUpperCase();
        }, 1200);
    }

    function initGlobe() {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(300, 250);
        document.getElementById('globe-container').appendChild(renderer.domElement);
        const globe = new THREE.Mesh(new THREE.SphereGeometry(5, 25, 25), new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true }));
        scene.add(globe); camera.position.z = 10;
        function animate() { requestAnimationFrame(animate); globe.rotation.y += 0.005; renderer.render(scene, camera); }
        animate();
    }

    function initChart() {
        new Chart(document.getElementById('botChart'), {
            type: 'line',
            data: { labels: ['Apr 25', 'Apr 26', 'Apr 27'], datasets: [{ label: 'Active Bots', data: [300, 550, 900], borderColor: '#ff0000', fill: true }] }
        });
    }
</script>
</body>
</html>
