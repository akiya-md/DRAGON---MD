<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 𝐌𝐃 - Get Pairing Code</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #111;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid #ff0000;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        .logo-img {
            width: 120px;
            border-radius: 50%;
            border: 3px solid #ff0000;
            margin-bottom: 15px;
        }
        h2 { color: #ff0000; margin-bottom: 5px; }
        p { font-size: 13px; color: #888; margin-bottom: 20px; }
        
        input {
            width: 85%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
            margin-bottom: 15px;
        }
        input:focus { border-color: #ff0000; outline: none; }

        .btn-get {
            width: 95%;
            padding: 12px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-get:hover { background: #cc0000; transform: scale(1.02); }

        #code-display {
            margin-top: 20px;
            padding: 15px;
            background: #222;
            border: 1px dashed #ff0000;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 5px;
            display: none; /* පස්සේ පෙන්වන්න */
        }
        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo2.jpg" alt="Logo" class="logo-img">
    <h2>𝐀𝐊𝐈𝐘𝐀 龍 𝐌𝐃</h2>
    <p>Enter your WhatsApp number with country code (e.g. 947xxxxxxxx)</p>

    <input type="number" id="number" placeholder="947XXXXXXXXX">
    <button class="btn-get" onclick="getCode()">GET PAIRING CODE</button>

    <div id="code-display"></div>
    
    <div class="footer-text">
        𝖯𝗈𝗐𝖾𝗋𝖽 𝖡𝗒 𝐀𝐊𝐈𝐘𝐀 龍 ⚙️ - 𝙼𝙳
    </div>
</div>

<script>
    function getCode() {
        const num = document.getElementById('number').value;
        const display = document.getElementById('code-display');
        
        if(!num) {
            alert("කරුණාකර නම්බර් එක ඇතුළත් කරන්න!");
            return;
        }

        display.style.display = "block";
        display.innerHTML = "<span style='font-size:14px; letter-spacing:0;'>Generating...</span>";

        // මෙතනට Backend API එක සම්බන්ධ කළාම කෝඩ් එක ලයිව් එනවා.
        // දැනට Sample Code එකක් පෙන්වමු:
        setTimeout(() => {
            display.innerHTML = "A7K9-R3X2"; 
        }, 2000);
    }
</script>

</body>
</html>
