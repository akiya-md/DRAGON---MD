<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKIYA 龍 - GET BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass-box { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 0, 0, 0.2); }
        .red-glow { text-shadow: 0 0 15px rgba(255, 0, 0, 0.8); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <h1 class="text-3xl font-black italic red-glow uppercase tracking-widest mb-10 text-center">/ GET YOUR PAIRING CODE /</h1>

    <div class="glass-box p-10 rounded-[40px] w-full max-w-md text-center shadow-2xl">
        <input type="text" id="phoneNumber" placeholder="947xxxxxxxx" 
               class="bg-transparent border-b-2 border-red-600 text-center text-2xl outline-none w-full font-mono py-2 mb-8">

        <div id="statusContainer" class="mb-8 hidden">
            <p id="statusText" class="text-[10px] text-gray-500 mb-2 uppercase font-bold"></p>
            <div id="codeDisplay" class="text-5xl font-black text-red-600 tracking-[8px]"></div>
        </div>

        <button onclick="getPairingCode()" id="submitBtn" 
                class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-full font-black uppercase text-xs tracking-widest transition">
            Get Code
        </button>
    </div>

    <script>
        async function getPairingCode() {
            const number = document.getElementById('phoneNumber').value.trim();
            const btn = document.getElementById('submitBtn');
            const statusText = document.getElementById('statusText');
            const codeDisplay = document.getElementById('codeDisplay');
            const statusContainer = document.getElementById('statusContainer');

            if (!number) return alert("අඩෝ නම්බර් එක ගහපන්!");

            btn.disabled = true;
            btn.innerText = "CONNECTING...";
            statusContainer.classList.remove('hidden');
            statusText.innerText = "AKIYA SERVER IS WAKING UP... PLEASE WAIT.";
            codeDisplay.innerText = "";

            // සර්වර් එකට දිගටම කතා කරන්න හදපු ලොජික් එක
            let attempts = 0;
            const maxAttempts = 3;

            async function attemptFetch() {
                try {
                    const response = await fetch(`https://akiya-api-rhlv.onrender.com/code?number=${number}`);
                    if (!response.ok) throw new Error('Server Busy');
                    
                    const data = await response.json();
                    if (data.code) {
                        statusText.innerText = "SUCCESS! YOUR CODE:";
                        codeDisplay.innerText = data.code;
                        btn.innerText = "GET NEW CODE";
                        btn.disabled = false;
                    } else {
                        throw new Error('No Code');
                    }
                } catch (err) {
                    attempts++;
                    if (attempts < maxAttempts) {
                        statusText.innerText = `RETRYING... (ATTEMPT ${attempts + 1})`;
                        setTimeout(attemptFetch, 3000); // තත්පර 3 කින් ආයෙත් ට්‍රයි කරනවා
                    } else {
                        statusText.innerText = "FETCH ERROR! සර්වර් එක තාම නිදි. විනාඩියකින් ආයේ ට්‍රයි කරපන්.";
                        btn.innerText = "TRY AGAIN";
                        btn.disabled = false;
                    }
                }
            }

            attemptFetch();
        }
    </script>
</body>
</html>
