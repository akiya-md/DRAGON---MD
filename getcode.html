<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AKIYA 龍 - GET BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10 text-center min-h-screen flex flex-col items-center justify-center">
    <h1 class="text-red-600 text-3xl font-black italic mb-10 tracking-widest uppercase">/ GET YOUR PAIRING CODE /</h1>
    <div class="bg-zinc-900 p-10 rounded-[40px] border border-red-600 inline-block shadow-[0_0_50px_rgba(255,0,0,0.1)]">
        <input type="text" id="phoneNumber" placeholder="947xxxxxxxx" class="bg-transparent border-b-2 border-red-600 text-center text-xl outline-none mb-8 w-full max-w-xs font-mono">
        <div id="statusContainer" class="mb-8 hidden">
            <p id="statusText" class="text-xs text-gray-400 mb-2 uppercase"></p>
            <div id="codeDisplay" class="text-4xl font-black text-red-600 tracking-[10px]"></div>
        </div>
        <button onclick="getPairingCode()" id="submitBtn" class="bg-red-600 px-10 py-3 rounded-full font-bold uppercase text-xs">Get Code</button>
    </div>

    <script>
        async function getPairingCode() {
            const number = document.getElementById('phoneNumber').value;
            const btn = document.getElementById('submitBtn');
            const statusContainer = document.getElementById('statusContainer');
            const statusText = document.getElementById('statusText');
            const codeDisplay = document.getElementById('codeDisplay');

            if (!number || number.length < 10) { alert("නම්බර් එක ගහපන්!"); return; }

            btn.disabled = true;
            btn.innerText = "Connecting...";
            statusContainer.classList.remove('hidden');
            statusText.innerText = "WAITING FOR WHATSAPP...";

            try {
                // සෘජුවම ලින්ක් එක මෙතන තියෙනවා
                const url = "https://akiya-api-rhlv.onrender.com/code?number=" + number;
                const response = await fetch(url);
                const data = await response.json();

                if (data.code) {
                    statusText.innerText = "YOUR PAIRING CODE:";
                    codeDisplay.innerText = data.code;
                    btn.innerText = "GET NEW CODE";
                } else {
                    statusText.innerText = "ERROR FROM SERVER";
                }
            } catch (err) {
                statusText.innerText = "FETCH ERROR!";
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
